<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Vault | Welcome</title>
  <link rel="stylesheet" href="welcome.css">
</head>
<body>
  <main class="welcome-page">
    <section class="welcome-card">
      <div class="welcome-art" aria-hidden="true">
        <div class="sun sun-one"></div>
        <div class="sun sun-two"></div>
        <div class="blob blob-one"></div>
        <div class="blob blob-two"></div>
        <div class="character">
          <div class="character-hair"></div>
          <div class="character-face"></div>
          <div class="character-body"></div>
          <div class="character-arm"></div>
        </div>
      </div>

      <div class="welcome-copy">
        <p class="eyebrow">Welcome</p>
        <h1>Welcome <span id="welcomeUserName">User</span></h1>
        <p class="welcome-text">Your account is all set. Save certificates, IDs, and important records in one clean, secure place.</p>

        <div class="welcome-actions">
          <a class="primary-link" href="Dashboard.html">Go to Dashboard</a>
          <a class="secondary-link" href="Certificates.html">Open Vault</a>
        </div>

        <button class="logout-button" type="button" data-action="logout">Logout</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
