<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Vault | Signup</title>
  <link rel="stylesheet" href="Signup.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-copy">
        <p class="eyebrow">Get Started</p>
        <h1>Create your document vault account</h1>
      </div>

      <form id="signupForm" class="auth-form">
        <label for="signupName">Full Name</label>
        <input type="text" id="signupName" name="signupName" placeholder="Enter your name" required>

        <label for="signupEmail">Email</label>
        <input type="email" id="signupEmail" name="signupEmail" placeholder="Enter your email" required>

        <label for="signupPassword">Password</label>
        <input type="password" id="signupPassword" name="signupPassword" placeholder="Create a password" required>

        <label for="signupConfirmPassword">Confirm Password</label>
        <input type="password" id="signupConfirmPassword" name="signupConfirmPassword" placeholder="Repeat your password" required>

        <button type="submit">Create Account</button>
        <p id="signupMessage" class="form-message"></p>
      </form>

      <p class="auth-switch">
        Already have an account?
        <a href="login.html">Login here</a>
      </p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
